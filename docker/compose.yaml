services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${BUILD_ALL_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-}
    container_name: graph-lab-api
    env_file:
      - graph-lab.env
    environment:
      PORT: "8080"
      NODE_ENV: production
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        ALL_PROXY: ${BUILD_ALL_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-}
    container_name: graph-lab-web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-4173}:80"
    restart: unless-stopped
